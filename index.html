<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIANG MAP - Loading</title>
    <!-- Fallback redirect if JavaScript is disabled -->
    <noscript><meta http-equiv="refresh" content="0; url=home/index.html"></noscript>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0f1410; /* Forest Floor Background */
            font-family: 'Barlow', sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .brand-text {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #40c057; /* Highland Tea Leaf */
            animation: pulse 2s infinite ease-in-out;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #40c057; /* Highland Tea Leaf */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            font-size: 16px;
            color: #868e96; /* Ridge Fog */
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: fade 1.5s infinite alternate;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.95); }
        }

        @keyframes fade {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }

        .redirect-link {
            position: absolute;
            bottom: 30px;
            font-size: 14px;
            color: #868e96; /* Ridge Fog */
            text-decoration: none;
            transition: color 0.3s;
        }

        .redirect-link:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="spinner"></div>
        <div class="brand-text">MIANG MAP</div>
        <div class="loading-text">Preparing your journey...</div>
    </div>

    <a href="home/index.html" class="redirect-link">Click here if not redirected automatically</a>

    <script>
        // Redirect after a short delay so the user can see the loading animation
        setTimeout(() => {
            window.location.href = 'home/index.html';
        }, 800); // 0.8 seconds delay
    </script>
</body>
</html>
