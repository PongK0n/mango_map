<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIANG MAP</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Sarabun:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <nav class="big-nav">
        <div class="nav-left">
            <button class="hamburger-btn" onclick="toggleHamburger()" id="hamburgerBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-brand" onclick="goHome()" style="cursor: pointer;">MIANG MAP</div>
        </div>

        <div class="hamburger-menu" id="hamburgerMenu">
            <a href="../home/index.html" class="hamburger-link">
                <span class="hamburger-icon">🏠</span>
                <span>Home</span>
            </a>
            <a href="../travel_package/index.html" class="hamburger-link active">
                <span class="hamburger-icon">📦</span>
                <span>Package</span>
            </a>
        </div>
        <div class="hamburger-backdrop" id="hamburgerBackdrop" onclick="toggleHamburger()"></div>

        <div class="nav-links">
            <button onclick="openPackageMenu()" class="nav-btn active">📦 Package</button>
            <button onclick="filterMap('stay')" class="nav-btn">🏠 Home Stay</button>
            <button onclick="filterMap('food')" class="nav-btn">🍛 Eatery</button>
            <button onclick="filterMap('tour')" class="nav-btn">🌳 Attraction</button>
            <button onclick="filterMap('other')" class="nav-btn">📌 Other</button>
            <button onclick="findMyLocation()" class="nav-btn gps-btn">📍 My Location</button>

            <button id="authBtn" onclick="toggleAuthModal()" class="nav-btn admin-btn">Login / Sign Up</button>
        </div>
    </nav>

    <div id="map"></div>

    <div id="loginModal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="authModalTitle">Login</h3>

            <div id="signupFields" style="display: none;">
                <div class="form-group">
                    <label>First Name (ชื่อ)</label>
                    <input type="text" id="firstNameInput" placeholder="Enter first name">
                </div>
                <div class="form-group">
                    <label>Last Name (นามสกุล)</label>
                    <input type="text" id="lastNameInput" placeholder="Enter last name">
                </div>
                <div class="form-group">
                    <label>Phone Number (เบอร์โทร)</label>
                    <input type="tel" id="phoneNumInput" placeholder="Enter phone number">
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="emailInput" placeholder="Enter email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="passwordInput" placeholder="Enter password">
            </div>
            <div style="font-size: 14px; text-align: center; margin-bottom: 15px;">
                <a href="#" onclick="toggleAuthType()" id="authToggleLink"
                    style="color: #1a73e8; text-decoration: none;">Don't have an account? Sign Up</a>
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal('loginModal')">Cancel</button>
                <button class="btn btn-save" id="authSubmitBtn" onclick="handleAuthAction()">Login</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Edit Location</h3>
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="editName">
            </div>

            <div class="form-group" style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Latitude</label>
                    <input type="text" id="editLat">
                </div>
                <div style="flex: 1;">
                    <label>Longitude</label>
                    <input type="text" id="editLng">
                </div>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select id="editCat">
                    <option value="stay">Home Stay</option>
                    <option value="food">Eatery</option>
                    <option value="tour">Attraction</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="editPhone">
            </div>
            <div class="form-group">
                <label>Facebook Link URL</label>
                <input type="text" id="editFacebook">
            </div>
            <div class="form-group">
                <label>Rating (e.g. 5.0)</label>
                <input type="text" id="editRating">
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal('editModal')">Cancel</button>
                <button class="btn btn-save" onclick="saveLocationEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="bookModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Book Home Stay</h3>
            <p id="bookLocName" style="color: #1a73e8; font-weight: bold; font-size: 16px; margin-top: -10px;"></p>
            <input type="hidden" id="bookLocId">

            <div class="form-group"
                style="background: #f1f3f4; padding: 10px; border-radius: 4px; margin-bottom: 15px;">
                <div style="font-size: 12px; color: #555;">Contact Info</div>
                <div id="bookUserName" style="font-weight: bold;"></div>
                <div id="bookUserPhone" style="font-size: 14px;"></div>
                <div id="bookUserEmail" style="font-size: 14px; color: #666;"></div>
            </div>

            <div class="form-group">
                <label>Travel Date (วันที่เข้าพัก)</label>
                <input type="date" id="bookDateInput">
            </div>

            <div class="form-group">
                <label>Guests Count (จำนวนผู้เข้าพัก)</label>
                <input type="number" id="bookGuestsInput" min="1" value="1">
            </div>

            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal('bookModal')">Cancel</button>
                <button class="btn btn-save" id="confirmBookBtn" onclick="submitBooking()">Confirm Booking</button>
            </div>
        </div>
    </div>

    <div id="bookPackageModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Book Travel Package</h3>
            <p id="bookPkgName" style="color: #1a73e8; font-weight: bold; font-size: 16px; margin-top: -10px;"></p>
            <input type="hidden" id="bookPkgId">

            <div class="form-group"
                style="background: #f1f3f4; padding: 10px; border-radius: 4px; margin-bottom: 15px;">
                <div style="font-size: 12px; color: #555;">Contact Info</div>
                <div id="bookPkgUserName" style="font-weight: bold;"></div>
                <div id="bookPkgUserPhone" style="font-size: 14px;"></div>
                <div id="bookPkgUserEmail" style="font-size: 14px; color: #666;"></div>
            </div>

            <div class="form-group">
                <label>Travel Date (วันที่เดินทาง)</label>
                <input type="date" id="bookPkgDateInput">
            </div>

            <div class="form-group">
                <label>Guests Count (จำนวนผู้เดินทาง)</label>
                <input type="number" id="bookPkgGuestsInput" min="1" value="1">
            </div>

            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal('bookPackageModal')">Cancel</button>
                <button class="btn btn-save" id="confirmBookPkgBtn" onclick="submitPackageBooking()">Confirm Booking</button>
            </div>
        </div>
    </div>

    <div id="packageSection" class="package-page">
        <div class="package-page-inner">
            <div class="package-page-header">
                <h2 class="package-page-title">🌿 Low Carbon Packages</h2>
                <p class="package-page-desc">เลือกแพ็กเกจท่องเที่ยวคาร์บอนต่ำที่เหมาะกับคุณ</p>
            </div>
            <div id="packageContent" class="package-grid"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>

</html>
